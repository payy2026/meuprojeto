<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Acesso Liberado</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #000000, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .box {
      text-align: center;
      max-width: 420px;
      width: 90%;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 55px;
      margin-bottom: 15px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #22c55e;
    }

    p {
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 25px;
    }

    .btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 16px;
      border: none;
      border-radius: 14px;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(34,197,94,0.4);
    }

    .btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #16a34a, #15803d);
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="icon">🚀</div>
    <h1>Acesso liberado!</h1>
    <p>Ative as notificações para continuar e receber conteúdos exclusivos.</p>

    <button class="btn" onclick="ativarPush()">
      🔓 Desbloquear agora
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    async function initPush() {
      const OneSignal = window.OneSignal;

      await OneSignal.init({
        appId: "SEU_APP_ID_AQUI",
        serviceWorkerPath: "/OneSignalSDKWorker.js",
        serviceWorkerUpdaterPath: "/OneSignalSDKUpdaterWorker.js",
        serviceWorkerParam: { scope: "/" }
      });
    }

    window.addEventListener("load", initPush);

    async function ativarPush() {
      const status = document.getElementById("status");

      try {
        await OneSignal.Notifications.requestPermission();

        if (Notification.permission === "granted") {
          status.innerText = "✅ Ativado com sucesso!";
        } else {
          status.innerText = "❌ Permissão negada";
        }

      } catch (e) {
        status.innerText = "❌ Erro ao ativar";
      }
    }
  </script>

</body>
</html>
