<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação de Segurança</title>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
  });
});
</script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  background: #f9f9f9;
  cursor: pointer;
}

.card {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.check {
  display: flex;
  align-items: center;
  border: 1px solid #ccc;
  padding: 12px;
  margin-top: 20px;
}

.square {
  width: 22px;
  height: 22px;
  border: 2px solid #555;
  margin-right: 10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.spinner {
  width:18px;
  height:18px;
  border:3px solid #ccc;
  border-top:3px solid #000;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.done {
  background: #4caf50;
  color: #fff;
}

#status {
  margin-top: 15px;
  color: #666;
  font-size: 14px;
}
</style>

</head>

<body onclick="start()">

<div class="card">

  <h3>Verificação de Segurança</h3>

  <div class="check">
    <div class="square" id="box"></div>
    <span>Eu não sou um robô</span>
  </div>

  <div id="status">Clique para verificar</div>

</div>

<script>
let rodou = false;

function start() {
  if (rodou) return;
  rodou = true;

  const box = document.getElementById("box");
  const status = document.getElementById("status");

  // loading
  box.innerHTML = '<div class="spinner"></div>';
  status.innerText = "Verificando...";

  // chama push
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.Slidedown.promptPush();
    } catch (e) {}
  });

  // finaliza
  setTimeout(() => {
    box.innerHTML = "✔";
    box.classList.add("done");
    status.innerText = "Verificação concluída";
  }, 3000);
}
</script>

</body>
</html>
