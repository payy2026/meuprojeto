<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>

<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" defer></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
  width: 320px;
}

button {
  background: #22c55e;
  border: none;
  padding: 15px;
  width: 100%;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
}

.status {
  margin-top: 15px;
  font-size: 14px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="box">
  <h2>Ativar Notificações</h2>
  <p>Clique abaixo para continuar</p>

  <button onclick="ativar()">Ativar agora</button>

  <div class="status" id="status"></div>
</div>

<script>
function ativar() {
  const status = document.getElementById("status");

  // verifica se OneSignal carregou
  if (typeof OneSignal === "undefined") {
    status.innerText = "⚠️ Notificação bloqueada. Tente outro navegador ou desative bloqueadores.";
    return;
  }

  window.OneSignalDeferred = window.OneSignalDeferred || [];

  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.init({
        appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
      });

      await OneSignal.showSlidedownPrompt();

      status.innerText = "✅ Solicitação enviada!";
    } catch (e) {
      status.innerText = "❌ Erro ao ativar notificação.";
    }
  });
}
</script>

</body>
</html>
