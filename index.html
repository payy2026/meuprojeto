<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loading Click</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  cursor: pointer;
}

#box {
  text-align: center;
}

.spinner {
  display: none;
  width: 40px;
  height: 40px;
  border: 4px solid #ccc;
  border-top: 4px solid #333;
  border-radius: 50%;
  animation: girar 1s linear infinite;
  margin: auto;
}

@keyframes girar {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body onclick="carregar()">

<div id="box">
  <h2>Clique para continuar</h2>
  <div class="spinner" id="load"></div>
</div>

<script>
function carregar() {
  document.getElementById("load").style.display = "block";
}
</script>

</body>
</html>
