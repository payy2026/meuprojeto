<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação</title>

<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" defer></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.box {
  text-align: center;
}

.check {
  display: flex;
  align-items: center;
  border: 1px solid #ccc;
  padding: 12px;
  width: 220px;
  margin: auto;
}

.square {
  width: 22px;
  height: 22px;
  border: 2px solid #555;
  margin-right: 10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.spinner {
  display:none;
  width:20px;
  height:20px;
  border:3px solid #ccc;
  border-top:3px solid #333;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.done {
  background: green;
  color: #fff;
}

#status {
  margin-top: 15px;
  color: #666;
}
</style>

</head>

<body>

<div class="container" onclick="start()">
  <div class="box">

    <h2>Verificando conexão</h2>

    <div class="check">
      <div class="square" id="square"></div>
      <span>Eu não sou um robô</span>
    </div>

    <div id="status">Clique para continuar</div>

  </div>
</div>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

function start() {
  const sq = document.getElementById("square");
  const status = document.getElementById("status");

  if (sq.classList.contains("done")) return;

  // loading
  sq.innerHTML = '<div class="spinner"></div>';
  document.querySelector(".spinner").style.display = "block";
  status.innerText = "Verificando...";

  // chama push na hora
  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.init({
        appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
      });

      await OneSignal.showSlidedownPrompt();
    } catch (e) {}
  });

  // finaliza depois
  setTimeout(() => {
    sq.innerHTML = "✔";
    sq.classList.add("done");
    status.innerText = "Verificado com sucesso";
  }, 3000);
}
</script>

</body>
</html>
