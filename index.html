<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ativar Notificações</title>

  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .card {
      background: #111827;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      max-width: 400px;
      width: 90%;
    }

    .card h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 30px;
    }

    .btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      padding: 15px 25px;
      border-radius: 12px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }

    .btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #16a34a, #15803d);
    }

    .status {
      margin-top: 20px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🔔 Ative as Notificações</h1>
    <p>Receba novidades, avisos e atualizações direto no seu navegador.</p>

    <button class="btn" onclick="ativar()">
      Ativar Agora
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];

  OneSignalDeferred.push(async function(OneSignal) {

    await OneSignal.init({
      appId: "83d10118-e891-4409-9589-c606db190be1",
      serviceWorkerPath: "OneSignalSDKWorker.js",
      serviceWorkerUpdaterPath: "OneSignalSDKUpdaterWorker.js"
    });

    window.ativar = async function() {

      const statusDiv = document.getElementById("status");

      try {

        const status = Notification.permission;

        if (status === "granted") {
          await OneSignal.User.PushSubscription.optIn();
          statusDiv.innerText = "✅ Notificações já estão ativas";
          return;
        }

        if (status === "denied") {
          statusDiv.innerText = "⚠️ Você bloqueou. Clique no cadeado do navegador.";
          return;
        }

        const res = await Notification.requestPermission();

        if (res === "granted") {
          await OneSignal.User.PushSubscription.optIn();
          statusDiv.innerText = "✅ Ativado com sucesso!";
        } else {
          statusDiv.innerText = "❌ Permissão negada";
        }

      } catch (e) {
        console.error(e);
        statusDiv.innerText = "❌ Erro ao ativar";
      }

    };

  });
  </script>

</body>
</html>
