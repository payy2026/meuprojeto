<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativar Notificações</title>

<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" defer></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

button {
  padding: 15px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<button onclick="ativar()">Ativar notificações</button>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

function ativar() {
  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.init({
        appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
      });

      await OneSignal.showSlidedownPrompt();

    } catch (e) {
      console.log("Erro:", e);
      alert("Push bloqueado ou erro no carregamento");
    }
  });
}
</script>

</body>
</html>
