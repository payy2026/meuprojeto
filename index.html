<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação</title>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<style>
body {
  background: #f0f2f5;
  font-family: Arial, sans-serif;
}

.container {
  width: 320px;
  margin: 150px auto;
}

.card {
  background: #fff;
  border-radius: 6px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.check {
  display: flex;
  align-items: center;
  cursor: pointer;
  border: 1px solid #ccc;
  padding: 12px;
  border-radius: 4px;
}

.box {
  width: 20px;
  height: 20px;
  border: 2px solid #555;
  margin-right: 10px;
}

.loading {
  margin-top: 15px;
  display: none;
  font-size: 14px;
}

.footer {
  margin-top: 10px;
  font-size: 12px;
  color: #999;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">

    <div class="check" onclick="verificar()">
      <div class="box"></div>
      <span>Não sou um robô</span>
    </div>

    <div class="loading" id="loading">
      Verificando...
    </div>

    <div class="footer">
      Protegido por verificação
    </div>

  </div>
</div>

<script>
function verificar() {
  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
      });

      await OneSignal.showSlidedownPrompt();
    });
  }, 1000);
}
</script>

</body>
</html>
