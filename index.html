<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação</title>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
  });
});
</script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  cursor: pointer;
  background: #fff;
}

.box {
  text-align: center;
}

.spinner {
  display: none;
  width: 40px;
  height: 40px;
  border: 4px solid #ccc;
  border-top: 4px solid #000;
  border-radius: 50%;
  animation: girar 1s linear infinite;
  margin: 20px auto;
}

@keyframes girar {
  100% { transform: rotate(360deg); }
}
</style>

</head>

<body onclick="iniciar()">

<div class="box">
  <h2>Clique para continuar</h2>
  <div class="spinner" id="load"></div>
</div>

<script>
function iniciar() {
  // mostra loading
  document.getElementById("load").style.display = "block";

  // chama OneSignal (VERSÃO CORRETA)
  window.OneSignalDeferred = window.OneSignalDeferred || [];

  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.Slidedown.promptPush();
    } catch (e) {
      console.log("Erro:", e);
    }
  });

  // opcional: finalizar depois
  setTimeout(() => {
    document.querySelector("h2").innerText = "Concluído ✔";
  }, 3000);
}
</script>

</body>
</html>
