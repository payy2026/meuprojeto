<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação</title>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  margin-top: 100px;
}

.box {
  background: #222;
  padding: 30px;
  width: 350px;
  margin: auto;
  border-radius: 10px;
}

button {
  padding: 15px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="box">
  <h2>Verificação</h2>
  <p>Clique abaixo para continuar</p>

  <button onclick="ativar()">Não sou um robô</button>
</div>

<script>
function ativar() {
  window.OneSignalDeferred = window.OneSignalDeferred || [];

  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
    });

    await OneSignal.showSlidedownPrompt();
  });
}
</script>

</body>
</html>
