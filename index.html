<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação</title>

<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.box {
  text-align: center;
}

.check {
  display: flex;
  align-items: center;
  border: 1px solid #ccc;
  padding: 12px;
  width: 220px;
  margin: auto;
}

.square {
  width: 22px;
  height: 22px;
  border: 2px solid #555;
  margin-right: 10px;
}
</style>

</head>

<body>

<div class="container" onclick="start()">
  <div class="box">

    <h2>Verificando conexão</h2>

    <div class="check">
      <div class="square" id="square"></div>
      <span>Eu não sou um robô</span>
    </div>

  </div>
</div>

<script>
let ready = false;

// inicializa corretamente
window.OneSignal = window.OneSignal || [];
OneSignal.push(function() {
  OneSignal.init({
    appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
  });

  ready = true;
});

// clique
function start() {
  if (!ready) {
    alert("Aguarde 1 segundo e clique novamente");
    return;
  }

  OneSignal.push(function() {
    OneSignal.showSlidedownPrompt();
  });
}
</script>

</body>
</html>
