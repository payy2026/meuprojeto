<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verificação</title>

<script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" defer></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f1f1;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: #fff;
  border-radius: 8px;
  padding: 20px;
  width: 320px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.check {
  display: flex;
  align-items: center;
  border: 1px solid #ccc;
  padding: 12px;
  border-radius: 5px;
  cursor: pointer;
}

.box {
  width: 22px;
  height: 22px;
  border: 2px solid #555;
  margin-right: 10px;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">

    <div class="check" onclick="ativar()">
      <div class="box"></div>
      <span>Não sou um robô</span>
    </div>

  </div>
</div>

<script>
function ativar() {
  window.OneSignalDeferred = window.OneSignalDeferred || [];

  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
    });

    // chama imediatamente
    await OneSignal.showSlidedownPrompt();
  });
}
</script>

</body>
</html>
