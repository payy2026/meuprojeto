<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Push Simples</title>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "2ea63444-e895-4836-b5e6-b739ca029d8f",
  });
});
</script>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}
button {
  padding:15px;
  font-size:18px;
  cursor:pointer;
}
</style>

</head>

<body>

<button onclick="ativar()">Ativar Notificação</button>

<script>
function ativar() {
  window.OneSignalDeferred = window.OneSignalDeferred || [];

  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.Slidedown.promptPush();
    } catch (e) {
      console.log(e);
    }
  });
}
</script>

</body>
</html>
