<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Push Notification</title>

<style>
body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial;
}

#banner {
    position: fixed;
    top: -100px;
    right: 20px;
    width: 300px;
    padding: 15px;
    background: #111;
    color: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.5s;
}

#banner.show {
    top: 20px;
}

.title {
    font-weight: bold;
    margin-bottom: 5px;
}

</style>
</head>

<body>

<div id="banner">
    <div class="title">Git Push</div>
    <div id="msg">Mensagem aqui</div>
</div>

<script>
function mostrar(msg){
    const banner = document.getElementById("banner");
    document.getElementById("msg").innerText = msg;

    banner.classList.add("show");

    setTimeout(()=>{
        banner.classList.remove("show");
    }, 3000);
}

// 🔥 chama automaticamente
mostrar("Push realizado com sucesso!");
</script>

</body>
</html>
